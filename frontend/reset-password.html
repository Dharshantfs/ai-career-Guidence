<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — AI Learning Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="site-nav">
  <div class="container">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 20L9 6L13 15L16 9L21 20" stroke="#CC6B3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Trailhead
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Log in</a></li>
      <li><a href="register.html" class="nav-cta">Get Started</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <span class="eyebrow" style="color:#A8532C;justify-content:center;">Almost there</span>
    <h2>Reset password</h2>
    <p class="auth-sub">Choose a new password for your account.</p>

    <div class="form-error" id="errorBanner"></div>
    <div class="form-success" id="successBanner"></div>

    <form id="resetPasswordForm">
      <div class="field">
        <label for="new_password">New password</label>
        <input type="password" id="new_password" placeholder="At least 6 characters" minlength="6" required>
      </div>
      <div class="field">
        <label for="confirm_password">Confirm new password</label>
        <input type="password" id="confirm_password" placeholder="Re-enter your new password" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Reset password</button>
    </form>

    <div class="auth-switch">Remembered it after all? <a href="login.html">Back to log in</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
