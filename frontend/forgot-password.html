<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — AI Learning Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="site-nav">
  <div class="container">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 20L9 6L13 15L16 9L21 20" stroke="#CC6B3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Trailhead
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Log in</a></li>
      <li><a href="register.html" class="nav-cta">Get Started</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <span class="eyebrow" style="color:#A8532C;justify-content:center;">Lost your way?</span>
    <h2>Forgot password</h2>
    <p class="auth-sub">Enter your account email and we'll send you a reset link.</p>

    <div class="form-error" id="errorBanner"></div>
    <div class="form-success" id="successBanner"></div>

    <form id="forgotPasswordForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Send reset link</button>
    </form>

    <!-- Shown only when EMAIL_ALERTS_ENABLED is false on the server, so the flow still
         works without an SMTP provider configured (local/dev convenience). -->
    <div class="hint-box hidden" id="devLinkBox">
      <p class="hint" style="margin-bottom:8px;">Email sending isn't configured on this server, so here's your reset link directly:</p>
      <a href="#" id="devLinkAnchor" class="devlink"></a>
    </div>

    <div class="auth-switch">Remembered it? <a href="login.html">Back to log in</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
