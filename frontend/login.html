<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — AI Learning Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="site-nav">
  <div class="container">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 20L9 6L13 15L16 9L21 20" stroke="#CC6B3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Trailhead
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="register.html" class="nav-cta">Get Started</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <span class="eyebrow" style="color:#A8532C;justify-content:center;">Welcome back</span>
    <h2>Log in</h2>
    <p class="auth-sub">Pick up your trail where you left off.</p>

    <div class="form-error" id="errorBanner"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required>
        <p class="hint" style="text-align:right;margin-top:8px;"><a href="forgot-password.html">Forgot password?</a></p>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Log in</button>
    </form>

    <p class="hint text-center" style="margin-top:16px;">Demo login: demo@student.com / demo1234 (after running seed_data.py)</p>
    <div class="auth-switch">New here? <a href="register.html">Create an account</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
