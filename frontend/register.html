<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — AI Learning Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="site-nav">
  <div class="container">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 20L9 6L13 15L16 9L21 20" stroke="#CC6B3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Trailhead
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Log in</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <span class="eyebrow" style="color:#A8532C;justify-content:center;">Waypoint 0</span>
    <h2>Create your account</h2>
    <p class="auth-sub">Start mapping your path in under a minute.</p>

    <div class="form-error" id="errorBanner"></div>

    <form id="registerForm">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="e.g. R K Suriya Narayanan" required minlength="2">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
      </div>
      <div class="field">
        <label for="role">I am a</label>
        <select id="role">
          <option value="student">Student</option>
          <option value="mentor">Mentor / Teacher</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Create account</button>
    </form>

    <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
